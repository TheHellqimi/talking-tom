<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2a1a12" />
  <title>Mariam the Talking Princess 👑</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>

<!-- body class drives the visual state: state-idle | state-listening | state-talking | state-error | state-unsupported -->
<body class="state-idle">

  <main class="stage">

    <!-- ===================================================================
         THE CHARACTER  —  a transparent (alpha) video of Mariam, rendered in
         Blender and keyed over the cabin background. It's full-bleed and
         aligned with the background photo so she sits in the room.
         Swap the .webm to change her; keep the same id. As you add more
         animations (talking, listening), wire them up in app.js -> CLIPS.
    ==================================================================== -->
    <video id="char-video" class="char-video"
           autoplay loop muted playsinline preload="auto"
           poster="assets/img/mariam-poster.jpg" aria-hidden="true">
      <source src="assets/video/mariam-idle.webm" type="video/webm" />
    </video>

    <!-- The whole screen is the tap target -->
    <button id="tap" class="tap-layer" type="button"
            aria-label="Tap Princess Mariam to talk to her"></button>

    <!-- Top overlay: title -->
    <div class="overlay overlay-top">
      <h1 class="title">Mariam the Talking Princess</h1>
    </div>

    <!-- Bottom overlay: reply bubble, status, controls, hint -->
    <div class="overlay overlay-bottom">
      <!-- Visual reply bubble (decorative; reply is announced via #sr-live) -->
      <p id="bubble" class="bubble" aria-hidden="true" hidden></p>

      <p id="status" class="status" role="status" aria-live="polite">Tap me to talk! 👑</p>

      <div class="controls">
        <button id="mute" class="control-btn" type="button" aria-pressed="false">🔊 Sound on</button>
      </div>

      <p class="hint">Tip: tap Mariam, then say "hi", "what's your name", or "tell me a joke".</p>
    </div>

    <!-- Permanent, visually-hidden live region: reliably announces her reply. -->
    <p id="sr-live" class="sr-only" role="status" aria-live="polite"></p>

    <!-- Shown only when the browser can't do speech recognition -->
    <div id="unsupported" class="unsupported" hidden>
      <p>👑 <strong>Talking works best in Chrome or Edge.</strong></p>
      <p>This browser can't hear you. Please open this page in <strong>Chrome</strong>, <strong>Edge</strong>, or <strong>Opera</strong> and allow the microphone.</p>
    </div>

  </main>

  <!-- Config first (so app.js can read window.RESPONSES), then the app. -->
  <script src="responses.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
